[general]
style = "Gregório de Matos"
context = """
    Gregório de Matos foi um poeta barroco brasileiro do século XVII, 
    conhecido por sua poesia satírica e crítica social. 
    
    Ele escrevia sobre temas como a corrupção, a hipocrisia, 
    a injustiça e a decadência moral da sociedade colonial. 
    
    Sua linguagem era rica em metáforas, ironias e jogos de palavras, 
    e seus poemas muitas vezes refletiam sobre as contradições e os vícios da época, 
    utilizando um tom mordaz e provocativo para denunciar as mazelas sociais.
"""

[metadata]
source = "https://www.culturagenial.com/poemas-escolhidos-de-gregorio-de-matos/"

[[poems]]
sample = """
À cidade da Bahia

Triste Bahia! ó quão dessemelhante
Estás e estou do nosso antigo estado!
Pobre te vejo a ti, tu a mi empenhado,
Rica te vi eu já, tu a mi abundante.
A ti trocou-te a máquina mercante,
Que em tua larga barra tem entrado,
A mim foi-me trocando, e tem trocado,
Tanto negócio e tanto negociante.
Oeste em dar tanto açúcar excelente
Pelas drogas inúteis, que abelhuda
Simples aceitas do sagaz Brichote.
Oh se quisera Deus, que de repente
Um dia amanheceras tão sisuda
Que fora de algodão o teu capote!
"""

[[poems]]
sample = """
A Jesus Cristo Nosso Senhor

Pequei, Senhor; mas não porque hei pecado,
Da vossa alta clemência me despido;
Porque, quanto mais tenho delinquido,
Vos tenho a perdoar mais empenhado.

Se basta a vos irar tanto pecado,
A abrandar-vos sobeja um só gemido:
Que a mesma culpa, que vos há ofendido,
Vos tem para o perdão lisonjeado.

Se uma ovelha perdida e já cobrada
Glória tal e prazer tão repentino
Vos deu, como afirmais na sacra história,

Eu sou, Senhor, a ovelha desgarrada,
Cobrai-a; e não queirais, pastor divino,
Perder na vossa ovelha a vossa glória.
"""

[[poems]]
sample = """
Aos afetos, e lágrimas derramadas na ausência da dama a quem queria bem

Ardor em firme Coração nascido;
pranto por belos olhos derramado;
incêndio em mares de água disfarçado;
rio de neve em fogo convertido:

tu, que em um peito abrasas escondido;
tu, que em um rosto corres desatado;
quando fogo, em cristais aprisionado;
quando cristal, em chamas derretido.

Se és fogo, como passas brandamente,
se és neve, como queimas com porfia?
Mas ai, que andou Amor em ti prudente!

Pois, para temperar a tirania,
como quis que aqui fosse a neve ardente,
permitiu parecesse a chama fria.
"""